name: iOS Build (AnyGram)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout layer-191 (patched)
        uses: actions/checkout@v4
        with:
          ref: layer-191
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30

      - name: Install Bazel 7.3.1 + deps
        run: |
          brew install bazelisk
          echo "7.3.1" > .bazelversion
          pip3 install pillow --break-system-packages
          bazel --version && xcodebuild -version
          grep -i swiftcopt .bazelrc || echo "swiftcopt OK"

      - name: Собираем IPA через Make.py build
        run: |
          cat > build-configuration.json << 'CONFIG'
          {
            "bundle_id": "ph.telegra.Telegraph",
            "api_id": "24053256",
            "api_hash": "bc8984a70877b5768a5a6a80222da985",
            "team_id": "C67CF9S4VU",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            --overrideBazelVersion \
            build \
            --configurationPath=build-configuration.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber=1 \
            --outputBuildArtifactsPath=build-output
          ls -lh build-output/ || true
        timeout-minutes: 150

      - name: Упаковываем AnyGram.ipa
        run: |
          if [ -f build-output/Telegram.ipa ]; then
            cp build-output/Telegram.ipa AnyGram.ipa
            ls -lh AnyGram.ipa
            echo "✅ IPA готов"
          else
            echo "❌ Telegram.ipa не найден"
            find . -name "*.ipa" 2>/dev/null | head -10 || true
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: AnyGram.ipa
          retention-days: 30
          if-no-files-found: error
