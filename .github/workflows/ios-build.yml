name: iOS Build (AnyGram)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout (без субмодулей)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули из оригинального репо
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30

      - name: Setup Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install Bazel + Python deps
        run: |
          brew install bazelisk
          pip3 install pillow

      - name: Создаём конфигурацию сборки
        run: |
          cat > build-configuration.json << 'CONFIG'
          {
            "bundle_id": "org.anygram.Telegram",
            "api_id": "24053256",
            "api_hash": "bc8984a70877b5768a5a6a80222da985",
            "team_id": "XXXXXXXXXX",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG
          cat build-configuration.json

      - name: Генерируем Xcode проект
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            generateProject \
            --configurationPath=build-configuration.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles
        timeout-minutes: 60
        continue-on-error: false

      - name: Собираем IPA (no codesign)
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --configurationPath=build-configuration.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --buildNumber=1 \
            --configuration=release_arm64 \
            --disableProvisioningProfiles 2>&1 | tail -100
        timeout-minutes: 150
        continue-on-error: true

      - name: Ищем и упаковываем IPA
        run: |
          echo "=== Поиск артефактов ==="
          find . -name "*.ipa" 2>/dev/null || echo "IPA не найден"
          find . -name "Telegram.app" -type d 2>/dev/null | head -5 || echo "APP не найден"
          find $HOME/telegram-bazel-cache -name "*.ipa" 2>/dev/null | head -5 || true
          
          # Пробуем найти IPA в разных местах
          IPA=$(find . $HOME/telegram-bazel-cache -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" AnyGram.ipa
            echo "IPA найден и скопирован: $IPA"
          else
            APP=$(find . $HOME/telegram-bazel-cache -name "Telegram.app" -type d 2>/dev/null | head -1)
            if [ -n "$APP" ]; then
              mkdir -p Payload
              cp -r "$APP" Payload/
              zip -r AnyGram.ipa Payload/
              echo "IPA создан из .app"
            else
              echo "Ни IPA ни .app не найден"
            fi
          fi
        continue-on-error: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: "*.ipa"
          retention-days: 30
        if: always()
