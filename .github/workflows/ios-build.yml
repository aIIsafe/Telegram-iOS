name: iOS Build (AnyGram)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout (без субмодулей)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули из оригинального репо
        run: |
          # Перенаправляем все недостающие субмодули на оригинальный TelegramMessenger
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1 2>&1 | tail -30
        continue-on-error: false

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Bazel
        run: brew install bazelisk && bazel --version

      - name: Build iOS (no codesign)
        run: |
          cd Telegram
          bazel build Telegram \
            --ios_multi_cpus=arm64 \
            --config=release_arm64 \
            2>&1 | tail -150
        continue-on-error: true

      - name: Package IPA
        run: |
          APP=$(find . -name "Telegram.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r AnyGram.ipa Payload/
            echo "IPA создан: AnyGram.ipa"
          else
            echo "Файл .app не найден"
            find . -name "*.app" -o -name "*.ipa" 2>/dev/null | head -10
          fi
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: "*.ipa"
          retention-days: 30
        if: always()
