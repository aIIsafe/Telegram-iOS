name: iOS Build (AnyGram)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout layer-191 (patched)
        uses: actions/checkout@v4
        with:
          ref: layer-191
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30

      - name: Install Bazel + Python deps
        run: |
          brew install bazelisk
          pip3 install pillow --break-system-packages
          bazel --version && xcodebuild -version
          echo "=== .bazelrc проверка ==="
          grep -i swiftcopt .bazelrc || echo "swiftcopt не найден — OK"

      - name: Создаём конфигурацию + генерируем проект
        run: |
          cat > build-configuration.json << 'CONFIG'
          {
            "bundle_id": "org.anygram.Telegram",
            "api_id": "24053256",
            "api_hash": "bc8984a70877b5768a5a6a80222da985",
            "team_id": "XXXXXXXXXX",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            generateProject \
            --configurationPath=build-configuration.json \
            --xcodeManagedCodesigning
        timeout-minutes: 60

      - name: Собираем IPA через Bazel (из корня проекта)
        run: |
          # Собираем из корня проекта — build-input создан Make.py generateProject
          ls build-input/configuration-repository/ || echo "configuration-repository не найден"
          bazel build //Telegram:Telegram \
            --ios_multi_cpus=arm64 \
            -c opt \
            --override_repository=build_configuration=build-input/configuration-repository \
            --define=buildNumber=1 \
            2>&1 | tail -100
        timeout-minutes: 150
        continue-on-error: true

      - name: Ищем и упаковываем IPA
        run: |
          echo "=== Все IPA и APP ==="
          find . -name "*.ipa" 2>/dev/null | grep -v ".noindex" | head -10 || true
          find . -name "Telegram.app" -type d 2>/dev/null | grep -v ".noindex" | head -5 || true
          
          IPA=$(find . -name "*.ipa" 2>/dev/null | grep -v ".noindex" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" AnyGram.ipa && ls -lh AnyGram.ipa && echo "✅ IPA найден!"
          else
            APP=$(find . -name "Telegram.app" -type d 2>/dev/null | grep -v ".noindex" | head -1)
            if [ -n "$APP" ]; then
              mkdir -p Payload && cp -r "$APP" Payload/
              zip -r AnyGram.ipa Payload/ && ls -lh AnyGram.ipa && echo "✅ IPA создан из .app"
            else
              echo "❌ Артефакт не найден"
            fi
          fi
        continue-on-error: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: "*.ipa"
          retention-days: 30
          if-no-files-found: warn
        if: always()
