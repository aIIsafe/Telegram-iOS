name: iOS Build (AnyGram)

on:
  push:
    branches: [master, layer-191]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout layer-191
        uses: actions/checkout@v4
        with:
          ref: layer-191
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30

      - name: Install Bazel + Python deps
        run: |
          brew install bazelisk
          pip3 install pillow --break-system-packages
          bazel --version && xcodebuild -version

      - name: Создаём конфигурацию сборки
        run: |
          cat > build-configuration.json << 'CONFIG'
          {
            "bundle_id": "org.anygram.Telegram",
            "api_id": "24053256",
            "api_hash": "bc8984a70877b5768a5a6a80222da985",
            "team_id": "XXXXXXXXXX",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG

      - name: Генерируем Xcode проект
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            generateProject \
            --configurationPath=build-configuration.json \
            --xcodeManagedCodesigning
        timeout-minutes: 60

      - name: Находим xcodeproj
        run: |
          find . -name "*.xcodeproj" -maxdepth 4 2>/dev/null
          ls Telegram/ | head -20

      - name: Собираем через xcodebuild (no codesign)
        run: |
          XCPROJ=$(find . -name "Telegram.xcodeproj" -maxdepth 5 2>/dev/null | head -1)
          echo "Проект: $XCPROJ"
          xcodebuild build \
            -project "$XCPROJ" \
            -scheme Telegram \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath build/DerivedData \
            2>&1 | tail -100
        timeout-minutes: 150
        continue-on-error: true

      - name: Упаковываем IPA из DerivedData
        run: |
          APP=$(find build/DerivedData -name "Telegram.app" -type d 2>/dev/null | head -1)
          echo "APP: $APP"
          if [ -n "$APP" ]; then
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r AnyGram.ipa Payload/
            ls -lh AnyGram.ipa
            echo "✅ IPA создан!"
          else
            echo "APP не найден, ищем везде..."
            find . -name "*.app" -type d 2>/dev/null | head -10
            find . -name "*.ipa" 2>/dev/null | head -5
          fi
        continue-on-error: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: "*.ipa"
          retention-days: 30
          if-no-files-found: warn
        if: always()
