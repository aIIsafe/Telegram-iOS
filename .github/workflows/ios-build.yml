name: iOS Build (AnyGram)

on:
  push:
    branches: [master, layer-191]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout layer-191
        uses: actions/checkout@v4
        with:
          ref: layer-191
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30

      - name: Install Bazel + Python deps
        run: |
          brew install bazelisk
          pip3 install pillow --break-system-packages
          bazel --version && xcodebuild -version

      - name: Создаём конфигурацию сборки
        run: |
          cat > build-configuration.json << 'CONFIG'
          {
            "bundle_id": "org.anygram.Telegram",
            "api_id": "24053256",
            "api_hash": "bc8984a70877b5768a5a6a80222da985",
            "team_id": "XXXXXXXXXX",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG

      - name: Генерируем Xcode проект
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            generateProject \
            --configurationPath=build-configuration.json \
            --xcodeManagedCodesigning
        timeout-minutes: 60

      - name: Собираем IPA (fake codesigning)
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            build \
            --configurationPath=build-configuration.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --buildNumber=1 \
            --configuration=release_arm64 2>&1 | tail -150
        timeout-minutes: 150
        continue-on-error: true

      - name: Ищем и упаковываем IPA
        run: |
          echo "=== Поиск IPA и APP ==="
          find . "$HOME/telegram-bazel-cache" -name "*.ipa" 2>/dev/null | head -10 || true
          find . "$HOME/telegram-bazel-cache" -name "Telegram.app" -type d 2>/dev/null | head -5 || true
          find "$HOME/telegram-bazel-cache" -name "*.ipa" 2>/dev/null | head -5 || true
          
          IPA=$(find . "$HOME/telegram-bazel-cache" -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" AnyGram.ipa && echo "✅ IPA найден: $IPA"
          else
            APP=$(find . "$HOME/telegram-bazel-cache" -name "Telegram.app" -type d 2>/dev/null | head -1)
            if [ -n "$APP" ]; then
              mkdir -p Payload && cp -r "$APP" Payload/
              zip -r AnyGram.ipa Payload/ && echo "✅ IPA создан из .app: $APP"
            else
              echo "❌ Артефакт не найден — показываю структуру кэша:"
              ls "$HOME/telegram-bazel-cache" 2>/dev/null || true
              find "$HOME/telegram-bazel-cache" -maxdepth 4 -name "*.app" 2>/dev/null || true
            fi
          fi
        continue-on-error: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: "*.ipa"
          retention-days: 30
          if-no-files-found: warn
        if: always()
