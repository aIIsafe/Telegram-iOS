name: iOS Build (AnyGram)

on:
  push:
    branches: [master, layer-191]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout layer-191
        uses: actions/checkout@v4
        with:
          ref: layer-191
          submodules: false
          fetch-depth: 1

      - name: Инициализируем субмодули
        run: |
          git config --global url."https://github.com/TelegramMessenger/".insteadOf "https://github.com/aIIsafe/"
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30

      - name: Install Bazel + Python deps
        run: |
          brew install bazelisk
          pip3 install pillow --break-system-packages
          bazel --version && xcodebuild -version

      - name: Создаём конфигурацию сборки
        run: |
          cat > build-configuration.json << 'CONFIG'
          {
            "bundle_id": "org.anygram.Telegram",
            "api_id": "24053256",
            "api_hash": "bc8984a70877b5768a5a6a80222da985",
            "team_id": "XXXXXXXXXX",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            generateProject \
            --configurationPath=build-configuration.json \
            --xcodeManagedCodesigning
        timeout-minutes: 60

      - name: Собираем IPA через Bazel напрямую
        run: |
          # Используем -c opt (релизная сборка) и ios_multi_cpus=arm64
          cd Telegram
          bazel build //Telegram:Telegram \
            --ios_multi_cpus=arm64 \
            -c opt \
            --define=buildNumber=1 \
            2>&1 | tail -100
        timeout-minutes: 150
        continue-on-error: true

      - name: Ищем IPA в bazel-bin
        run: |
          echo "=== Поиск артефактов ==="
          find Telegram/bazel-bin -name "*.ipa" 2>/dev/null | head -10 || true
          find Telegram/bazel-out -name "*.ipa" 2>/dev/null | head -5 || true
          find . -name "*.ipa" 2>/dev/null | head -10 || true
          find . -name "Telegram.app" -type d 2>/dev/null | head -5 || true
          
          IPA=$(find . -name "*.ipa" 2>/dev/null | grep -v ".noindex" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" ../AnyGram.ipa 2>/dev/null || cp "$IPA" AnyGram.ipa
            echo "✅ IPA найден: $IPA"
          else
            APP=$(find . -name "Telegram.app" -type d 2>/dev/null | grep -v ".noindex" | head -1)
            if [ -n "$APP" ]; then
              mkdir -p ../Payload && cp -r "$APP" ../Payload/
              cd .. && zip -r AnyGram.ipa Payload/
              ls -lh AnyGram.ipa
              echo "✅ IPA создан из .app"
            else
              echo "❌ Артефакт не найден"
            fi
          fi
          ls -la ../*.ipa 2>/dev/null || ls -la *.ipa 2>/dev/null || true
        working-directory: Telegram
        continue-on-error: true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-iOS
          path: "*.ipa"
          retention-days: 30
          if-no-files-found: warn
        if: always()
